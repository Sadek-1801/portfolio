name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Run tests
        run: bin/rails test
      - name: Build static site
        env:
          RAILS_ENV: production
          SECRET_KEY_BASE: static-export-does-not-serve-requests
          RAILS_RELATIVE_URL_ROOT: /portfolio
        run: |
          bin/rails assets:precompile
          bin/rails static:export
          grep -q "/portfolio/assets/" site/index.html || (echo "asset prefix missing" && exit 1)
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
